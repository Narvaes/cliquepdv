<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sua Loja | CliquePDV</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* Default values - will be overridden dynamically by settings */
      --elite-navy: #001b44;
      --elite-gold: #F59E0B;
      --elite-gold-light: #FCD34D;
      --elite-gold-dark: #D97706;
      --elite-contrast: #001b44;
    }

    body {
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
      background-color: #fcfcfc;
    }

    .font-display {
      font-family: 'Playfair Display', serif;
    }

    .bg-elite-navy {
      background-color: var(--elite-navy);
    }

    .text-elite-gold {
      color: var(--elite-gold);
    }

    .bg-elite-gold {
      background-color: var(--elite-gold);
    }

    .wheat-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .text-gradient-gold {
      background: linear-gradient(to bottom, var(--elite-gold-light) 0%, var(--elite-gold) 50%, var(--elite-gold-dark) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-gold-shine {
      position: relative;
      overflow: hidden;
    }

    .btn-gold-shine::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: rotate(45deg);
      transition: 0.5s;
    }

    .btn-gold-shine:hover::after {
      left: 100%;
      top: 100%;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-slide-up {
      animation: slideUp 0.8s ease-out forwards;
    }

    .menu-card {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .menu-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px -15px rgba(0, 27, 68, 0.15);
    }

    /* Custom scrollbar - moved to dynamic injection in AdminLayout */
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
